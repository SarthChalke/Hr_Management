{% extends "base.html" %}
{% block title %}Error 403 - {{ app_name }}{% endblock %}
{% macro body() %}
<div class="auth-wrap" style="min-height: 70vh;">
  <div class="auth-card text-center">
    <div class="auth-mark mx-auto">!</div>
    <h2>Error 403</h2>
    <p class="text-muted">You don't have permission to view this page.</p>
    <a href="/" class="btn btn-navy">Go Home</a>
  </div>
</div>
{% endmacro %}
{% block content %}{{ body() }}{% endblock %}
{% block guest_content %}{{ body() }}{% endblock %}
